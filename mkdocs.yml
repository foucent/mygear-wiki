site_name: MyGear Guide
site_url: https://guide.mygear.top/
repo_url: https://mygear.top/
repo_name: Shop now
theme:
  name: material
  custom_dir: overrides
  language: custom
  palette:
    scheme: default
    primary: teal
    accent: teal
  icon:
    repo: material/cart
  features:
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tables.scroll
    - navigation.sections

plugins:
  - search
  - redirects:
      redirect_maps:
        getting-started/basic-questions.md: getting-started/essential-questions-before-buying.md
        getting-started/hurricane-3-boosting-method.md: getting-started/hurricane-3-multi-stage-boosting.md
        advanced/rubber-thickness-and-hardness.md: advanced/choosing-thickness-vs-hardness.md
        shop/faq.md: shop/faq-and-updates.md
        shop/price-list.md: shop/pricing-and-sourcing.md
        shop/packaging-and-tracking.md: shop/shipping-and-delivery.md
        shop/log.md: shop/faq-and-updates.md
        shop/products/index.md: shop/pricing-and-sourcing.md
        shop/products/butterfly-marcos-freitas-alc.md: shop/pricing-and-sourcing.md
        shop/products/butterfly-harimoto-innerforce-alc.md: shop/pricing-and-sourcing.md
        shop/products/butterfly-harimoto-innerforce-super-zlc.md: shop/pricing-and-sourcing.md

markdown_extensions:
  - toc
  - tables
  - fenced_code
  - md_in_html

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/gallery-lightbox.js
  - javascripts/unit-copy.js

# Local `mkdocs serve` includes these; production `mkdocs build` / GitHub Pages omit them.
draft_docs: |
  getting-started/rubber-lifespan.md
  images/rubber-lifespan/**

# Hot-reload overrides/ (template notes, header tweaks). docs/ is watched by default.
watch:
  - overrides

extra:
  social:
    - icon: fontawesome/brands/youtube
      link: https://www.youtube.com/@Mygear-top
      name: YouTube
    - icon: material/cart
      link: https://mygear.top/
      name: Shop at mygear.top

# 导航配置在这里
nav:
  - Home: index.md
  - Getting Started:
      - Essential Questions Before Buying: getting-started/essential-questions-before-buying.md
      - Blade Performance Metrics: getting-started/blade-performance-metrics.md
      - Blade Feel Fundamentals: getting-started/blade-feel-fundamentals.md
      - Accelerating With Gear: getting-started/accelerating-with-gear.md
      - Hurricane 3 Multi-Stage Boosting: getting-started/hurricane-3-multi-stage-boosting.md
  - Advanced:
      - Harimoto SZLC vs SALC: advanced/harimoto-szlc-vs-salc.md
      - Why Tenergy Before Dignics: advanced/why-tenergy-before-dignics.md
      - Hurricane Blue vs Orange Sponge: advanced/hurricane-blue-vs-orange-sponge.md
      - Choosing Thickness vs Hardness: advanced/choosing-thickness-vs-hardness.md
      - Boosting Truth: advanced/boosting-truth.md
  - Shop:
      - FAQ & Updates: shop/faq-and-updates.md
      - Pricing & Sourcing: shop/pricing-and-sourcing.md
      - Shipping & Delivery: shop/shipping-and-delivery.md
