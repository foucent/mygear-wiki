site_name: MyGear Guide
site_url: https://guide.mygear.top/
repo_url: https://mygear.top/
repo_name: Shop now
theme:
  name: material
  custom_dir: overrides
  language: custom
  palette:
    scheme: default
    primary: teal
    accent: teal
  icon:
    repo: material/cart
  features:
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tables.scroll
    - navigation.sections

plugins:
  - search
  - redirects:
      redirect_maps:
        getting-started/basic-questions.md: guide/essential-questions-before-buying.md
        getting-started/essential-questions-before-buying.md: guide/essential-questions-before-buying.md
        getting-started/blade-performance-metrics.md: guide/blade-performance-metrics.md
        getting-started/blade-feel-fundamentals.md: guide/blade-feel-fundamentals.md
        getting-started/accelerating-with-gear.md: guide/accelerating-with-gear.md
        getting-started/hurricane-3-boosting-method.md: guide/hurricane-3-multi-stage-boosting.md
        getting-started/hurricane-3-multi-stage-boosting.md: guide/hurricane-3-multi-stage-boosting.md
        getting-started/rubber-lifespan.md: guide/rubber-lifespan.md
        advanced/rubber-thickness-and-hardness.md: guide/choosing-thickness-vs-hardness.md
        advanced/choosing-thickness-vs-hardness.md: guide/choosing-thickness-vs-hardness.md
        advanced/harimoto-szlc-vs-salc.md: guide/harimoto-szlc-vs-salc.md
        advanced/outer-vs-inner-fiber.md: guide/outer-vs-inner-fiber.md
        advanced/ma-long-blade-evolution.md: index.md
        advanced/why-tenergy-before-dignics.md: guide/why-tenergy-before-dignics.md
        advanced/hurricane-blue-vs-orange-sponge.md: guide/hurricane-blue-vs-orange-sponge.md
        advanced/boosting-truth.md: guide/boosting-truth.md
        advanced/booster-oil-comparison.md: guide/booster-oil-comparison.md
        advanced/donic-zhang-jike-original-carbon.md: gear/donic-zhang-jike-original-carbon.md
        equipment/donic-zhang-jike-original-carbon.md: gear/donic-zhang-jike-original-carbon.md
        shop/faq.md: shop/faq-and-updates.md
        shop/price-list.md: shop/pricing-and-sourcing.md
        shop/packaging-and-tracking.md: shop/shipping-and-delivery.md
        shop/log.md: shop/faq-and-updates.md
        shop/products/index.md: shop/pricing-and-sourcing.md
        shop/products/butterfly-marcos-freitas-alc.md: shop/pricing-and-sourcing.md
        shop/products/butterfly-harimoto-innerforce-alc.md: shop/pricing-and-sourcing.md
        shop/products/butterfly-harimoto-innerforce-super-zlc.md: shop/pricing-and-sourcing.md

markdown_extensions:
  - toc
  - tables
  - fenced_code
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.superfences

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/gallery-lightbox.js
  - javascripts/unit-copy.js

# Local `mkdocs serve` includes these; production `mkdocs build` / GitHub Pages omit them.
draft_docs: |
  guide/rubber-lifespan.md
  images/rubber-lifespan/**

# Hot-reload overrides/ (template notes, header tweaks). docs/ is watched by default.
watch:
  - overrides

extra:
  analytics:
    provider: google
    property: G-1VPCP3FZN6
  social:
    - icon: fontawesome/brands/youtube
      link: https://www.youtube.com/@Mygear-top
      name: YouTube
    - icon: material/cart
      link: https://mygear.top/
      name: Shop at mygear.top

# 导航配置在这里
