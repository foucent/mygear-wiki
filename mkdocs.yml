site_name: MyGear Guide
site_url: https://guide.mygear.top/
repo_url: https://mygear.top/
repo_name: Shop now
theme:
  name: material
  custom_dir: overrides
  language: custom
  palette:
    scheme: default
    primary: teal
    accent: teal
  icon:
    repo: material/cart
  features:
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tables.scroll
    - navigation.sections

plugins:
  - search

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/youtube
      link: https://www.youtube.com/@Mygear-top
      name: YouTube
    - icon: material/cart
      link: https://mygear.top/
      name: Shop at mygear.top

